name: Bug Report
description: Something is not working
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.

  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: '@drive-photos/react'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: '0.1.0'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Code snippet or repo link that reproduces the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Node.js only
        - Next.js
