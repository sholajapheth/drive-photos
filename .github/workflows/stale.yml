name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 60 days. It will be closed in 7 days unless there is activity.'
          stale-pr-message: 'This PR has been inactive for 30 days. It will be closed in 7 days unless there is activity.'
          close-issue-message: 'Closed due to inactivity. Please reopen if still relevant.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security
